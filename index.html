<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ethica — Call Reviewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%2301696f'/><path d='M7 20v-4M11 22v-8M15 24V8M19 22v-8M23 21v-6M27 20v-4' stroke='white' stroke-width='2' stroke-linecap='round'/></svg>">
</head>
<body>
  <a href="#main-content" class="sr-only" style="position:absolute;top:0;left:0;padding:8px;background:var(--color-primary);color:var(--color-text-inverse);z-index:1000;">Skip to content</a>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" role="navigation" aria-label="Call recordings">
      <div class="sidebar-header">
        <div class="sidebar-brand">
          <!-- Ethica Logo — soundwave mark -->
          <svg width="28" height="28" viewBox="0 0 32 32" fill="none" aria-label="Ethica logo">
            <rect width="32" height="32" rx="7" fill="var(--color-primary)"/>
            <path d="M7 20v-4M11 22v-8M15 24V8M19 22v-8M23 21v-6M27 20v-4" stroke="var(--color-text-inverse)" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="sidebar-brand-name">Ethica</span>
        </div>
        <div class="sidebar-title">Call Recordings</div>
      </div>

      <ul class="sidebar-list" id="call-list" role="list" aria-label="List of call recordings">
        <!-- Populated by JS -->
      </ul>

      <div class="sidebar-footer">
        <span class="sidebar-footer-label">9 recordings</span>
        <button class="theme-toggle" data-theme-toggle aria-label="Switch to dark mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main" id="main-content">
      <!-- Mobile theme toggle -->
      <div class="mobile-header">
        <button class="theme-toggle" data-theme-toggle-mobile aria-label="Switch to dark mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </div>
        <div class="empty-state-title">Select a call</div>
        <div class="empty-state-text">Choose a recording from the sidebar to begin reviewing feedback</div>
      </div>

      <!-- Call Detail View -->
      <div class="call-detail" id="call-detail">
        <!-- Header -->
        <div class="call-header">
          <div class="call-header-top">
            <h1 class="call-title" id="detail-title"></h1>
            <span class="sentiment-badge" id="detail-sentiment">
              <span class="sentiment-dot"></span>
              <span id="detail-sentiment-label"></span>
            </span>
          </div>
          <div class="call-meta" id="detail-meta">
            <!-- Populated by JS -->
          </div>
        </div>

        <!-- Audio Player (sticky) -->
        <div class="audio-player" id="audio-player">
          <button class="play-btn" id="play-btn" aria-label="Play">
            <svg viewBox="0 0 24 24" fill="currentColor" id="play-icon"><polygon points="6,3 20,12 6,21"/></svg>
          </button>
          <span class="player-time" id="current-time">0:00</span>
          <div class="player-progress" id="player-progress">
            <div class="player-track">
              <div class="player-fill" id="player-fill" style="width: 0%">
                <div class="player-thumb"></div>
              </div>
            </div>
          </div>
          <span class="player-time" id="total-time">0:00</span>
          <button class="speed-btn" id="speed-btn" aria-label="Playback speed">1x</button>
          <audio id="audio-element" preload="metadata"></audio>
        </div>

        <!-- Tabs -->
        <div class="tabs-container">
          <div class="tabs" role="tablist" aria-label="Content tabs">
            <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="panel-summary" data-tab="summary">Summary</button>
            <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-transcript" data-tab="transcript">Transcript</button>
            <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-highlights" data-tab="highlights">Highlights</button>
          </div>
        </div>

        <!-- Scrollable content -->
        <div class="main-scroll">
          <div class="tab-content">
            <!-- Summary Panel -->
            <div class="tab-panel active" id="panel-summary" role="tabpanel">
              <p class="summary-text" id="detail-summary"></p>

              <div class="content-section">
                <h2 class="content-section-title">Key Highlights <span class="count" id="highlights-count"></span></h2>
                <div class="highlights-list" id="summary-highlights"></div>
              </div>

              <div class="content-section">
                <h2 class="content-section-title">Key Points</h2>
                <ul class="key-points-list" id="key-points-list"></ul>
              </div>
            </div>

            <!-- Transcript Panel -->
            <div class="tab-panel" id="panel-transcript" role="tabpanel">
              <div class="transcript-container" id="transcript-container"></div>
            </div>

            <!-- Highlights Panel -->
            <div class="tab-panel" id="panel-highlights" role="tabpanel">
              <div id="grouped-highlights"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="./calls-data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
